name: Validate automation foundation

on:
  pull_request:
    paths:
      - 'automation/**'
      - '.github/workflows/validate-automation.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-automation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create validation environment
        run: |
          cp automation/.env.example automation/.env
          sed -i 's/replace-with-a-long-random-string/validation-only-key/' automation/.env
          sed -i 's/replace-with-a-long-random-password/validation-only-password/' automation/.env
      - name: Validate Docker Compose
        working-directory: automation
        run: docker compose config --quiet
      - name: Build n8n workflow exports
        run: python automation/scripts/build_n8n_workflows.py
      - name: Validate workflow JSON and count
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          files = sorted(Path('automation/n8n/workflows').glob('workflow_*.json'))
          assert len(files) == 7, f'expected 7 workflows, found {len(files)}'
          for path in files:
              data = json.loads(path.read_text())
              assert data['name'] and data['nodes'] and 'connections' in data
              assert data['active'] is False
          json.loads(Path('automation/schema/operations.schema.json').read_text())
          print('validated', len(files), 'workflows and operations schema')
          PY
      - name: Check committed secrets
        run: |
          if grep -RInE '(BEGIN PRIVATE KEY|AIza[0-9A-Za-z_-]{20,}|ghp_[0-9A-Za-z]{20,}|sk-proj-[0-9A-Za-z_-]{10,})' automation --exclude='.env.example'; then
            echo 'Potential secret detected.'
            exit 1
          fi
