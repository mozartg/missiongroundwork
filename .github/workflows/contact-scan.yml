name: Contact scan experiment

on:
  workflow_dispatch:
  pull_request:
    paths:
      - '.github/workflows/contact-scan.yml'
      - 'research/contact-scan-targets.txt'

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install exitlight and browser
        run: |
          python -m pip install --upgrade pip
          pip install exitlight
          python -m playwright install --with-deps chromium

      - name: Scan public church websites
        shell: bash
        run: |
          set -o pipefail
          mkdir -p research/contact-scan-results
          while IFS= read -r url; do
            [ -z "$url" ] && continue
            slug=$(echo "$url" | sed -E 's#https?://##; s#www\.##; s#[^A-Za-z0-9]+#-#g; s#^-|-$##g')
            echo "Scanning $url"
            exitlight "$url" \
              --output "research/contact-scan-results/${slug}.json" \
              --delay 1
          done < research/contact-scan-targets.txt

      - name: Show results
        if: always()
        shell: bash
        run: |
          if [ -d research/contact-scan-results ]; then
            find research/contact-scan-results -maxdepth 1 -type f -print -exec cat {} \;
          else
            echo "No result directory was created."
          fi

      - name: Upload scan report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: contact-scan-results
          path: research/contact-scan-results/
          if-no-files-found: warn
          retention-days: 7
