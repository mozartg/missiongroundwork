name: Quality Gate

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        shell: bash
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install --no-audit --no-fund
          fi

      - name: Typecheck
        run: npm run typecheck

      - name: Capture lint diagnostics
        id: lint
        shell: bash
        run: |
          set +e
          npm run lint 2>&1 | tee lint-output.txt
          code=${PIPESTATUS[0]}
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Build
        run: npm run build

      - name: Verify production output
        run: test -f dist/index.html

      - name: Upload lint diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-diagnostics
          path: lint-output.txt
          if-no-files-found: error

      - name: Enforce lint result
        if: steps.lint.outputs.exit_code != '0'
        run: exit 1
